# SIE — frontend estático en Cloudflare Workers (Assets)
# Compatible con Vite 5.x. NO usar el preset "Framework: Vite" del dashboard.
#
# Dashboard Cloudflare → Build:
#   Build command:    bun run build
#   Deploy command:   bun run cf:deploy
#   Output directory: dist  (solo referencia; wrangler lee ./dist)

name = "sie"
main = "worker/index.ts"
compatibility_date = "2024-09-23"
send_metrics = false

# URL del API OpenWA en el VPS (HTTP; el navegador usa /api/wa-proxy en el mismo dominio).
[vars]
OPENWA_UPSTREAM = "http://178.104.115.2/api"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Sin esto, /api/wa-proxy no llega al Worker → error 1003 (403 Forbidden)
run_worker_first = ["/api/wa-proxy", "/api/wa-proxy/*"]

# index.html sin caché; assets con hash sí (ver public/_headers)
html_handling = "auto-trailing-slash"

[observability]
enabled = false
